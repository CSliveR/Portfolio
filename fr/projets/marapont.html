<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/css/style.css">

<body class="scroll-reveal">
    <header>
        <button id="burgerBtn">

        </div>
        <nav>
            <ul>
                <li>Ilyès Drouiche</li>

        <div class="horizontalContainer">

                <div id="dropdown-content">                    
                    <a href="/en/pages/excuses.html"><img src="/img/icons8-etats-unis-32.png" alt="Anglais"> English</a>

    <div class="horizontalContainer">
        <main>
            <h1>MaraPont</h1>
            <section class="horizontalContainer">
                <div class="verticalContainer">
                    <p style="font-size: xx-large; font-weight: bold; ">Cette page est en cours de rédaction </p>

                    <button onclick="window.location.href='https://marapont.fr'">Visiter MaraPont</button>

    </div>
    <script src="/js/script.js"></script>
